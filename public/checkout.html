<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Finaliser | LX LUXOR</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;500;800&display=swap" rel="stylesheet">
</head>
<body style="background: var(--secondary-color); background-image: var(--bg-marble);">

    <header style="padding: 0 5%;">
        <a href="index.html" class="logo">LU<span>XOR</span></a>
        <a href="index.html" style="text-decoration: none; color: var(--text-dark); font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase;">&larr; Boutique</a>
    </header>

    <div style="max-width: 1200px; margin: 4rem auto; padding: 0 5%;">
        <div class="checkout-grid" style="display: grid; grid-template-columns: 1.5fr 1fr; gap: 4rem;">
            
            <div class="card" style="padding: 4rem; background: var(--white); box-shadow: var(--shadow-soft);">
                <h2 style="font-weight: 300; letter-spacing: 5px; text-transform: uppercase; margin-bottom: 3rem;">Informations de Livraison</h2>
                <form id="checkout-form">
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; margin-bottom: 2rem;">
                        <div>
                            <label style="font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase; color: #888;">Nom Complet</label>
                            <input type="text" id="name" required style="width: 100%; border: none; border-bottom: 1px solid #ddd; padding: 10px 0; outline: none;">
                        </div>
                        <div>
                            <label style="font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase; color: #888;">Email</label>
                            <input type="email" id="email" required placeholder="exemple@luxe.com" style="width: 100%; border: none; border-bottom: 1px solid #ddd; padding: 10px 0; outline: none;">
                        </div>
                    </div>
                    <div style="margin-bottom: 2rem;">
                        <label style="font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase; color: #888;">Téléphone</label>
                        <input type="tel" id="phone" required inputmode="tel" placeholder="+212 ..." style="width: 100%; border: none; border-bottom: 1px solid #ddd; padding: 10px 0; outline: none;">
                    </div>
                    <div style="margin-bottom: 3rem;">
                        <label style="font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase; color: #888;">Adresse de Livraison</label>
                        <textarea id="address" required rows="3" style="width: 100%; border: 1px solid #eee; padding: 15px; margin-top: 10px; outline: none;"></textarea>
                    </div>
                    <p style="font-size: 0.8rem; color: #999; line-height: 1.6;">
                        * En validant votre commande, vous acceptez nos conditions générales de vente. Paiement à la livraison par défaut.
                    </p>
                </form>
            </div>

            <div class="checkout-summary" style="position: sticky; top: 150px; height: fit-content;">
                <div class="card" style="padding: 3rem; background: #000; color: #fff;">
                    <h3 style="font-weight: 300; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 2.5rem; color: var(--accent-color);">Résumé du Panier</h3>
                    <div id="order-summary" style="max-height: 400px; overflow-y: auto; margin-bottom: 2rem;">
                        <!-- Items -->
                    </div>
                    <hr style="border: 0.5px solid #333; margin-bottom: 2rem;">
                    <div style="display: flex; justify-content: space-between; font-size: 1.4rem; letter-spacing: 1px;">
                        <span style="font-weight: 200;">TOTAL</span>
                        <span id="finish-total" style="font-weight: 800; color: var(--accent-color);">0.00 €</span>
                    </div>
                    <button class="btn-luxe sticky-bottom-btn" style="width: 100%; margin-top: 3rem; background: var(--white); color: #000; border: none; font-weight: 800;" onclick="submitOrder()">Confirmer la commande</button>
                </div>
            </div>

        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const summary = document.getElementById('order-summary');
            let total = 0;
            cart.forEach(item => {
                total += item.price * item.quantity;
                summary.innerHTML += `
                    <div style="display: flex; gap: 15px; margin-bottom: 1.5rem; align-items: center;">
                        <img src="${item.image_url}" style="width: 60px; height: 60px; object-fit: cover;">
                        <div style="flex: 1;">
                            <div style="font-size: 0.8rem; letter-spacing: 1px;">${item.name}</div>
                            <div style="font-size: 0.7rem; color: #888;">Qté: ${item.quantity} × ${item.price} €</div>
                        </div>
                        <div style="font-weight: 600;">${(item.price * item.quantity).toFixed(2)} €</div>
                    </div>
                `;
            });
            document.getElementById('finish-total').innerText = total.toFixed(2) + ' €';
        });

        async function submitOrder() {
            const form = document.getElementById('checkout-form');
            if (!form.reportValidity()) return;

            const customer = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                address: document.getElementById('address').value,
                total_price: parseFloat(document.getElementById('finish-total').innerText)
            };

            try {
                const response = await fetch('/api/orders', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ customer, items: cart })
                });

                const result = await response.json();
                if (result.success) {
                    alert('Félicitations. Votre commande prestige #' + result.orderId + ' a été enregistrée avec succès.');
                    localStorage.removeItem('cart');
                    window.location.href = 'index.html';
                }
            } catch (err) {
                alert('Désolé, une erreur technique est survenue : ' + err.message);
            }
        }
    </script>
</body>
</html>
